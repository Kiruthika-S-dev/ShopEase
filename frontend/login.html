<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width,
        initial-scale=1.0">
    <title>ShopEase – Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-box">
        <h2>🛒 ShopEase</h2>
        <p class="subtitle">
            Your favourite shopping destination
        </p>

        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="active"
                onclick="showTab('login')"
                id="loginTab">
                Login
            </button>
            <button onclick="showTab('register')"
                id="registerTab">
                Register
            </button>
        </div>

        <!-- Alert -->
        <div class="alert" id="alertBox"></div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email"
                    id="loginEmail"
                    placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password"
                    id="loginPassword"
                    placeholder="Enter your password">
            </div>
            <button class="btn-primary"
                onclick="handleLogin()">
                Login
            </button>
        </div>

        <!-- Register Form -->
        <div id="registerForm"
            style="display:none">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text"
                    id="regName"
                    placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email"
                    id="regEmail"
                    placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password"
                    id="regPassword"
                    placeholder="Create a password">
            </div>
            <button class="btn-primary"
                onclick="handleRegister()">
                Create Account
            </button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
